server {
    listen 80;

    location /hls/ {
        root /usr/share/nginx/html;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }

    location /health {
        return 200 "ok";
    }
}
