<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">&#9632; SecureFeed</span>
      <span id="clock" class="clock"></span>
    </div>
    <div class="header-right">
      <span id="cam-count" class="stat"></span>
      <button id="layout-btn" title="Toggle layout">&#9783;</button>
      <button id="fullscreen-btn" title="Fullscreen">&#x26F6;</button>
    </div>
  </header>

  <main id="grid"></main>

  <!-- Lightbox for expanded view -->
  <div id="lightbox" class="lightbox hidden">
    <button id="lightbox-close">&times;</button>
    <video id="lightbox-video" autoplay muted playsinline></video>
    <div id="lightbox-label"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
